# ===============================
# DATABASE CONFIGURATION
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/agri_connect
spring.datasource.username=root
spring.datasource.password=YOUR_DB_PASSWORD
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===============================
# SERVER CONFIGURATION
# ===============================
server.port=8080

# ===============================
# JWT CONFIGURATION
# ===============================
jwt.secret=YOUR_JWT_SECRET_KEY
jwt.expiration=86400000

# ===============================
# CORS CONFIGURATION
# ===============================
spring.web.cors.allowed-origins=http://localhost:5173

# ===============================
# PAYU CONFIGURATION (Test Mode)
# ===============================
payu.key=YOUR_PAYU_KEY
payu.salt=YOUR_PAYU_SALT
payu.url=https://test.payu.in/_payment

# ===============================
# GROQ AI API
# ===============================
groq.api.key=YOUR_GROQ_API_KEY
groq.api.url=https://api.groq.com/openai/v1/chat/completions

# ===============================
# SMS - Twilio
# ===============================
twilio.account-sid=YOUR_TWILIO_SID
twilio.auth-token=YOUR_TWILIO_AUTH_TOKEN
twilio.phone-number=YOUR_TWILIO_NUMBER
twilio.enabled=true

# Fast2SMS disable करा
fast2sms.enabled=false

# ===============================
# EMAIL - Gmail SMTP
# ===============================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=YOUR_EMAIL
spring.mail.password=YOUR_APP_PASSWORD
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ===============================
# OTP CONFIG
# ===============================
otp.expiry.minutes=10

# ===============================
# DATA.GOV.IN - AGMARKNET API
# ===============================
datagov.api.key=YOUR_DATA_GOV_API_KEY